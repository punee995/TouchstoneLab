<script>
// ================= FULLSCREEN TOGGLE =================
function toggleFullScreen(container){

    const isFull = container.classList.contains("fullscreen");

    if(!isFull){
        container.classList.add("fullscreen");
    } else {
        container.classList.remove("fullscreen");

        // Force reset styles
        container.style.width = "";
        container.style.height = "";
    }

    const btn = container.querySelector(".fs-btn");
    btn.textContent = container.classList.contains("fullscreen") ? "✕" : "⛶";

    const plotDiv = container.querySelector(".plot");

    // Important: give browser time to reflow
    setTimeout(()=>{
        Plotly.Plots.resize(plotDiv);
    },150);
}

// Touch double-tap for mobile
let lastTap = 0;
document.querySelectorAll('.chart-container').forEach(container=>{
    container.addEventListener('touchend', function(e) {
        let currentTime = new Date().getTime();
        let tapLength = currentTime - lastTap;
        if(tapLength < 500 && tapLength > 0) { toggleFullScreen(container); }
        lastTap = currentTime;
    });
});

document.addEventListener("keydown", function(e){
    if(e.key === "Escape"){
        document.querySelectorAll(".chart-container.fullscreen")
        .forEach(container=>{
            container.classList.remove("fullscreen");

            const btn = container.querySelector(".fs-btn");
            if(btn) btn.textContent = "⛶";

            const plotDiv = container.querySelector(".plot");
            setTimeout(()=>{
                Plotly.Plots.resize(plotDiv);
            },150);
        });
    }
});

/* ================= GLOBAL ================= */
let datasets=[];
let markers=[];
let bwMarkers=[];
let currentSmithDataTraces = [];
/* ================= MATH ================= */
function mag(c){ return Math.hypot(c.re,c.im); }
function phase(c){ return Math.atan2(c.im,c.re); }

function unwrap(ph){
	let out=[ph[0]],offset=0;
	for(let i=1;i<ph.length;i++){
		let dp=ph[i]-ph[i-1];
		if(dp>Math.PI) offset-=2*Math.PI;
		if(dp<-Math.PI) offset+=2*Math.PI;
		out.push(ph[i]+offset);
	}
	return out;
}

function computeGD(f,ph){
	let gd=[];
	for(let i=0;i<f.length;i++){
		if(i===0)
			gd.push(-(ph[1]-ph[0])/(2*Math.PI*(f[1]-f[0]))*1e9);
		else if(i===f.length-1){
			let n=f.length-1;
			gd.push(-(ph[n]-ph[n-1])/(2*Math.PI*(f[n]-f[n-1]))*1e9);
		}else{
			gd.push(-(ph[i+1]-ph[i-1])/(2*Math.PI*(f[i+1]-f[i-1]))*1e9);
		}
	}
	return gd;
}

/* ================= PARSER ================= */
function convertFreq(f,u){
	u=u.toUpperCase();
	if(u==="GHZ") return f*1e9;
	if(u==="MHZ") return f*1e6;
	if(u==="KHZ") return f*1e3;
	return f;
}

function toComplex(a,b,f){
	if(f==="RI") return {re:a,im:b};
	let ang=b*Math.PI/180;
	if(f==="MA") return {re:a*Math.cos(ang),im:a*Math.sin(ang)};
	if(f==="DB"){
		let m=Math.pow(10,a/20);
		return {re:m*Math.cos(ang),im:m*Math.sin(ang)};
	}
}

function processDataset(ds){

    ds.processed = {};

    Object.keys(ds.sparams).forEach(param => {

        const f = ds.freq;
        const s = ds.sparams[param];

        const magLin = new Float64Array(s.length);
            for(let i=0;i<s.length;i++){
                magLin[i] = Math.hypot(s[i].re, s[i].im);
            }
        const magDB  = magLin.map(v => 20*Math.log10(v));
        const rl     = magLin.map(v => -20*Math.log10(v));
        const vswr   = magLin.map(v=>{
            v = Math.min(v,0.999999);
            return (1+v)/(1-v);
        });

        const phaseRaw = s.map(c => Math.atan2(c.im,c.re));
        const phaseUnwrapped = unwrap(phaseRaw);
        // const gd = computeGD(f, phaseUnwrapped);
        const gd = smooth(computeGD(f, phaseUnwrapped), 3);

        const z = s.map(c=>{
            const den = (1-c.re)**2 + c.im**2;
            return {
                re: ds.z0*((1+c.re)*(1-c.re)+c.im*c.im)/den,
                im: ds.z0*(2*c.im)/den
            };
        });

        ds.processed[param] = {
            magLin,
            magDB,
            rl,
            vswr,
            phase: phaseUnwrapped,
            gd,
            z
        };
    });
}

function parseTouchstone(text,name){

    let freq=[],sparams={},format="MA",unit="HZ";
    let z0=50;

    // 🔹 Detect number of ports from file extension
    let portMatch = name.match(/\.s(\d+)p$/i);
    if(!portMatch){
        console.error("Cannot detect port count from filename");
        return null;
    }
    let ports = parseInt(portMatch[1]);

    let expected = 1 + 2*ports*ports;   // numbers per frequency block
    let buffer=[];

    text.split(/\r?\n/).forEach(line=>{

        line=line.trim();
        if(!line) return;

        // Remove full-line comments
        if(line.startsWith("!")) return;

        // Remove inline comments
        line = line.split("!")[0].trim();
        if(!line) return;

        // Header line
        if(line.startsWith("#")){
            let p=line.split(/\s+/);
            unit=p[1].toUpperCase();
            format=p[3].toUpperCase();
            if(p.includes("R")) z0=parseFloat(p[p.indexOf("R")+1]);
            return;
        }

        // Convert numbers
        let nums=line.split(/\s+/).map(Number);
        if(nums.some(n=>isNaN(n))) return;

        // Accumulate numbers (works for single or multiline)
        buffer.push(...nums);

        // Process full blocks
        while(buffer.length >= expected){

            let f = buffer[0];
            freq.push(convertFreq(f,unit));

            let idx=1;

            for(let i=1;i<=ports;i++){
                for(let j=1;j<=ports;j++){
                    let key=`S${i}${j}`;
                    if(!sparams[key]) sparams[key]=[];

                    sparams[key].push(
                        toComplex(buffer[idx],buffer[idx+1],format)
                    );

                    idx+=2;
                }
            }

            // Remove processed block
            buffer.splice(0,expected);
        }
    });

    console.log("Parsed:", name);
    console.log("Ports:", ports);
    console.log("Frequency points:", freq.length);

    return {name,freq,sparams,z0};
}

/* ================= FILE LOAD ================= */
function formatFreqForInput(f_Hz) {
	if(f_Hz >= 1e9) return (f_Hz/1e9)+"G";
	if(f_Hz >= 1e6) return (f_Hz/1e6)+"M";
	if(f_Hz >= 1e3) return (f_Hz/1e3)+"k";
	return f_Hz.toString();
}

function parseFreqInput(str) {
	if (!str) return NaN;
	str = str.trim().toUpperCase();
	let factor = 1;
	if (str.endsWith("K")) factor = 1e3;
	else if (str.endsWith("M")) factor = 1e6;
	else if (str.endsWith("G")) factor = 1e9;

	let num = parseFloat(str);
	if (isNaN(num)) return NaN;

	return num * factor;
}

function populateParams(){
	let sel=document.getElementById("paramSelect");
	sel.innerHTML="";
	Object.keys(datasets[0].sparams).forEach(k=>{
		let o=document.createElement("option");
		o.value=k;
		o.textContent=k;
		sel.appendChild(o);
	});
}

document.getElementById("plotMode").onchange = () => {
    const plotMode = document.getElementById("plotMode").value;
    const paramSelect = document.getElementById("paramSelect");

    if(plotMode === "all") {
        paramSelect.style.display = "none";
    } else {
        paramSelect.style.display = "inline-block"; // show it again
    }

    updateAll();
};
document.getElementById("paramSelect").onchange=updateAll;
document.getElementById("freqScale").onchange=updateAll;

window.addEventListener("DOMContentLoaded", () => {

    const popup = document.getElementById("startupPopup");

    // Show popup
    popup.classList.remove("opacity-0", "pointer-events-none");
    popup.classList.add("opacity-100");

    // Auto hide after 5 seconds
    setTimeout(() => {
        popup.classList.remove("opacity-100");
        popup.classList.add("opacity-0");

        setTimeout(() => {
            popup.classList.add("pointer-events-none");
        }, 500);

    }, 1500);

});

/* ================= AUTO SCALE ================= */
function getFreqScale(f_Hz){
	let maxF = Math.max(...f_Hz);
	if(maxF>=1e9) return {scale:1e9,unit:"GHz"};
	if(maxF>=1e6) return {scale:1e6,unit:"MHz"};
	if(maxF>=1e3) return {scale:1e3,unit:"kHz"};
	return {scale:1,unit:"Hz"};
}

/* ================= UPDATE ================= */
function updateAll(){

    if(!datasets.length) return;

    let mode=document.getElementById("plotMode").value;
    let param=document.getElementById("paramSelect").value;
    let scaleType=document.getElementById("freqScale").value;

    let fMin = parseFreqInput(document.getElementById("startFreq").value);
    let fMax = parseFreqInput(document.getElementById("stopFreq").value);

    if (isNaN(fMin)) fMin = -Infinity;
    if (isNaN(fMax)) fMax = Infinity;

    let allFreq = datasets.flatMap(ds => ds.freq);
    let {scale: fScale, unit: fUnit} = getFreqScale(allFreq);

    let magTr=[],phaseTr=[],rlTr=[],vswrTr=[],gdTr=[],impTr=[];
    let smithDataTraces=[];

    datasets.forEach((ds, dsIndex)=>{

        let keys=(mode==="all")?Object.keys(ds.sparams):[param];

        keys.forEach(k=>{

            let processed = ds.processed[k];

            let indices = ds.freq
                .map((f,i)=>({f,i}))
                .filter(p => p.f >= fMin && p.f <= fMax)
                .map(p=>p.i);

            if(!indices.length) return;

            let f_Hz = indices.map(i=>ds.freq[i]);
            let f_plot = f_Hz.map(v=>v/fScale);

            let label=datasets.length>1?`${ds.name} - ${k}`:k;

            let magDB = indices.map(i=>processed.magDB[i]);
            let rl = indices.map(i=>processed.rl[i]);
            let vs = indices.map(i=>processed.vswr[i]);
            let ph = indices.map(i=>processed.phase[i]);
            let gd = indices.map(i=>processed.gd[i]);
            let z = indices.map(i=>processed.z[i]);
            let sComplex = indices.map(i=>ds.sparams[k][i]);

            magTr.push({
                x: f_plot,
                y: magDB,
                name: label,
                mode: "lines",
                dsIndex: dsIndex,
                hovertemplate:
                    "Freq: %{x:.6f} " + fUnit +
                    "<br>Mag: %{y:.3f} dB" +
                    "<extra>" + label + "</extra>"
            });

            phaseTr.push({
                x: f_plot,
                y: ph.map(p=>p*180/Math.PI),
                name: label,
                mode: "lines",
                dsIndex: dsIndex,
                hovertemplate:
                    "Freq: %{x:.6f} " + fUnit +
                    "<br>Phase: %{y:.3f} deg" +
                    "<extra>" + label + "</extra>"
            });

            rlTr.push({
                x: f_plot,
                y: rl,
                name: label,
                mode: "lines",
                dsIndex: dsIndex,
                hovertemplate:
                    "Freq: %{x:.6f} " + fUnit +
                    "<br>Return Loss: %{y:.3f} dB" +
                    "<extra>" + label + "</extra>"
            });

            vswrTr.push({
                x: f_plot,
                y: vs,
                name: label,
                mode: "lines",
                dsIndex: dsIndex,
                hovertemplate:
                    "Freq: %{x:.6f} " + fUnit +
                    "<br>VSWR: %{y:.3f}" +
                    "<extra>" + label + "</extra>"
            });

            gdTr.push({
                x: f_plot,
                y: gd,
                name: label,
                mode: "lines",
                dsIndex: dsIndex,
                hovertemplate:
                    "Freq: %{x:.6f} " + fUnit +
                    "<br>Group Delay: %{y:.3f} ns" +
                    "<extra>" + label + "</extra>"
            });

            impTr.push({
                x: f_plot,
                y: z.map(v=>v.re),
                name: label+" R",
                mode: "lines",
                dsIndex: dsIndex,
                hovertemplate:
                    "Freq: %{x:.6f} " + fUnit +
                    "<br>R: %{y:.3f} Ω" +
                    "<extra>" + label + "</extra>"
            });

            impTr.push({
                x: f_plot,
                y: z.map(v=>v.im),
                name: label+" X",
                mode: "lines",
                dsIndex: dsIndex,
                hovertemplate:
                    "Freq: %{x:.6f} " + fUnit +
                    "<br>X: %{y:.3f} Ω" +
                    "<extra>" + label + "</extra>"
            });

            smithDataTraces.push({
                x: sComplex.map(c=>c.re),
                y: sComplex.map(c=>c.im),
                mode:"lines",
                name:label,
                dsIndex: dsIndex,
                hovertemplate:
                    "Γ Real: %{x:.4f}" +
                    "<br>Γ Imag: %{y:.4f}" +
                    "<extra>" + label + "</extra>"
            });
        });
    });

    function layout(title){
        return {
            hovermode: "closest",
            paper_bgcolor:"#111827",
            plot_bgcolor:"#111827",
            font:{color:"#e5e7eb"},
            title:{ text:title, x:0.5 },
            xaxis:{ type:scaleType, title:"Frequency ("+fUnit+")" },
            yaxis:{ title:title },
            legend:{
                orientation:"v",
                x:1.02,
                y:1,
                bgcolor:"#111827",
                bordercolor:"#374151",
                borderwidth:1,
                font:{size:11}
            },
            margin:{l:60,r:180,t:60,b:60}
        };
    }

    Plotly.react("magPlot", magTr, layout(param + " - Magnitude (dB)"));
    Plotly.react("phasePlot", phaseTr, layout(param + " - Phase (deg)"));
    Plotly.react("rlPlot", rlTr, layout(param + " - Return Loss (dB)"));
    Plotly.react("vswrPlot", vswrTr, layout(param + " - VSWR"));
    Plotly.react("gdPlot", gdTr, layout(param + " - Group Delay (ns)"));
    Plotly.react("impPlot", impTr, layout(param + " - Impedance (Ω)"));

    currentSmithDataTraces = smithDataTraces;
    drawSmithChart();

    attachClick();
    drawMarkers();
}

function resetRange(){

    if(!datasets.length) return;

    // get min/max across ALL datasets
    let allFreq = datasets.flatMap(ds => ds.freq);

    let minF = Math.min(...allFreq);
    let maxF = Math.max(...allFreq);

    document.getElementById("startFreq").value = formatFreqForInput(minF);
    document.getElementById("stopFreq").value  = formatFreqForInput(maxF);

    updateAll();
}

function smooth(arr, window=5){
    return arr.map((v,i)=>{
        let start = Math.max(0,i-window);
        let end   = Math.min(arr.length-1,i+window);
        let sum=0,count=0;
        for(let j=start;j<=end;j++){ sum+=arr[j]; count++; }
        return sum/count;
    });
}

/* ================= DRAW MARKERS ================= */

function drawMarkers() {

    if (!datasets.length) return;

    let param = document.getElementById("paramSelect").value;
    let {scale: fScale} = getFreqScale(datasets[0].freq);

    // Remove old marker traces first
    ["magPlot","phasePlot","rlPlot","vswrPlot","gdPlot","impPlot"].forEach(id=>{
        let gd = document.getElementById(id);
        if(!gd.data) return;

        let markerIndices = [];
        gd.data.forEach((tr,i)=>{
            if(tr.name && tr.name.startsWith("MARKER_"))
                markerIndices.push(i);
        });

        if(markerIndices.length)
            Plotly.deleteTraces(id, markerIndices);
    });

    if (!markers.length) {
        drawSmithChart();
        return;
    }

    markers.forEach((m,i)=>{

        let ds = datasets[m.dsIndex];
        let f_Hz = ds.freq;
        let processed = ds.processed[param];
        let d = ds.sparams[param];

        if(!processed || !d) return;

        // Find nearest index
        let idx = f_Hz.reduce((best,val,j)=>
            Math.abs(val-m.freqHz)<Math.abs(f_Hz[best]-m.freqHz)?j:best,0);

        let x = f_Hz[idx] / fScale;

        let magVal = Math.hypot(d[idx].re, d[idx].im);
        let magDB = 20*Math.log10(magVal);
        let rlVal = -20*Math.log10(magVal);
        let vs = (1+Math.min(magVal,0.999999))/(1-Math.min(magVal,0.999999));

        let ph = processed.phase[idx]*180/Math.PI;
        let gd = processed.gd[idx];

        let zRe = processed.z[idx].re;
        let zIm = processed.z[idx].im;

        function makeDot(y,labelSuffix=""){
            return {
                x:[x],
                y:[y],
                mode:"markers+text",
                marker:{
                    size:10,
                    color:"#facc15",
                    line:{color:"#000",width:1}
                },
                text:["M"+(i+1)+labelSuffix],
                textposition:"top center",
                name:"MARKER_"+(i+1)+""+labelSuffix,
                showlegend:false
            };
        }

        // Add markers to plots
        Plotly.addTraces("magPlot", makeDot(magDB));
        Plotly.addTraces("phasePlot", makeDot(ph));
        Plotly.addTraces("rlPlot", makeDot(rlVal));
        Plotly.addTraces("vswrPlot", makeDot(vs));
        Plotly.addTraces("gdPlot", makeDot(gd));

        // Impedance markers (Real & Imag)
        Plotly.addTraces("impPlot", makeDot(zRe," R"));
        Plotly.addTraces("impPlot", makeDot(zIm," X"));
    });

    // Redraw Smith chart with markers
    drawSmithChart();
}

function drawSmithChart(){

    if(!datasets.length) return;

    let ds0 = datasets[0];
    let smithGrid = generateSmithGrid(ds0.z0);

    let markerTraces = [];

    if(markers.length){

        let param = document.getElementById("paramSelect").value;

        markers.forEach((m,i)=>{

            let ds = datasets[m.dsIndex];
            if(!ds) return;

            let f_Hz = ds.freq;
            let d = ds.sparams[param];
            if(!d) return;

            let idx = f_Hz.reduce((best,val,j)=>
                Math.abs(val-m.freqHz) < Math.abs(f_Hz[best]-m.freqHz) ? j : best,0);

            markerTraces.push({
                x:[d[idx].re],
                y:[d[idx].im],
                mode:"markers+text",
                marker:{
                    size:12,
                    color:"#facc15",
                    line:{color:"#000",width:1}
                },
                text:["M"+(i+1)],
                textposition:"top center",
                showlegend:false
            });
        });
    }

    Plotly.react("smithPlot",
        [...smithGrid, ...currentSmithDataTraces, ...markerTraces],
        {
            paper_bgcolor:"#111827",
            plot_bgcolor:"#111827",
            font:{color:"#e5e7eb"},
            xaxis:{
                range:[-1.1,1.1],
                scaleanchor:"y",
                showgrid:false,
                zeroline:false
            },
            yaxis:{
                range:[-1.1,1.1],
                showgrid:false,
                zeroline:false
            },
            margin:{l:40,r:40,t:40,b:40},
            title:"Smith Chart (Γ Plane)"
        }
    );
}

function attachClick(){

    ["magPlot","phasePlot","rlPlot","vswrPlot","gdPlot","impPlot"].forEach(id=>{

        let plot = document.getElementById(id);

        plot.removeAllListeners?.("plotly_click");

        plot.on("plotly_click", function(data){

            if(!datasets.length) return;

            const pts = data.points;

            // choose point closest to cursor vertically
            let best = pts[0];
            let minDist = Math.abs(pts[0].y - data.event.y);

            pts.forEach(p=>{
                let d = Math.abs(p.y - data.event.y);
                if(d < minDist){
                    best = p;
                    minDist = d;
                }
            });

            const trace = best.data;

            if(trace.name && trace.name.startsWith("MARKER_")) return;

            const scale = getFreqScale(datasets[0].freq).scale;

            markers.push({
                freqHz: best.x * scale,
                dsIndex: trace.dsIndex
            });

            updateMarkerTable();
            drawMarkers();

        });

    });
}

function updateMarkerTable(){

    let body=document.getElementById("markerTable");
    body.innerHTML="";
    if(!datasets.length || !markers.length) return;

    let param=document.getElementById("paramSelect").value;

    markers.forEach((m,i)=>{

        let ds = datasets[m.dsIndex];
        let f_Hz = ds.freq;
        let d = ds.sparams[param];

        let idx = f_Hz.reduce((best,val,j)=>
            Math.abs(val-m.freqHz)<Math.abs(f_Hz[best]-m.freqHz)?j:best,0);

        let {scale: fScale, unit: fUnit} = getFreqScale(f_Hz);

        let processed = ds.processed[param];
        let ph = processed.phase;
        let gd = processed.gd;
        let z = processed.z;

        let mval=mag(d[idx]);
        let vs=(1+Math.min(mval,0.999999))/(1-Math.min(mval,0.999999));

        let gammaRe = d[idx].re;
        let gammaIm = d[idx].im;

        let den = (1 - gammaRe)**2 + gammaIm**2;

        let zRe = ds.z0 * (((1 + gammaRe)*(1 - gammaRe) + gammaIm*gammaIm) / den);
        let zIm = ds.z0 * ((2 * gammaIm) / den);

        let tr=document.createElement("tr");
        tr.innerHTML=`
<td>M${i+1}</td>
<td>${(f_Hz[idx]/fScale).toFixed(6)} ${fUnit}</td>
<td>${(20*Math.log10(mval)).toFixed(3)}</td>
<td>${(ph[idx]*180/Math.PI).toFixed(3)}</td>
<td>${vs.toFixed(3)}</td>
<td>${gd[idx].toFixed(3)}</td>
<td>${zRe.toFixed(2)} + j${zIm.toFixed(2)}</td>
<td><button onclick="deleteMarker(${i})">X</button></td>`;
        body.appendChild(tr);
    });

    "#00FF00", // bright green
    "#00BFFF", // deep sky blue

/* ================= SMITH GRID ================= */

function generateSmithGrid(z0 = 50) {

    const traces = [];

    const rList = [0, 0.2, 0.5, 1, 2, 5];      // constant resistance
    const xList = [0.2, 0.5, 1, 2, 5];         // constant reactance

    const xSweep = [];
    for (let x = -10; x <= 10; x += 0.01) xSweep.push(x);

    const rSweep = [];
    for (let r = 0; r <= 10; r += 0.01) rSweep.push(r);

    // ---- Constant Resistance Circles ----
    rList.forEach(r => {

        let gammaRe = [];
        let gammaIm = [];

        xSweep.forEach(x => {

            let z = { re: r, im: x };
            let denom = (z.re + 1)**2 + z.im**2;

            let gr = ((z.re - 1)*(z.re + 1) + z.im**2) / denom;
            let gi = (2 * z.im) / denom;

            gammaRe.push(gr);
            gammaIm.push(gi);
        });

        traces.push({
            x: gammaRe,
            y: gammaIm,
            mode: "lines",
            line: { color: "#374151", width: 1 },
            hoverinfo: "skip",
            showlegend: false
        });
    });

    // ---- Constant Reactance Arcs ----
    xList.forEach(x => {

        [-1, 1].forEach(sign => {

            let gammaRe = [];
            let gammaIm = [];

            rSweep.forEach(r => {

                let z = { re: r, im: sign * x };
                let denom = (z.re + 1)**2 + z.im**2;

                let gr = ((z.re - 1)*(z.re + 1) + z.im**2) / denom;
                let gi = (2 * z.im) / denom;

                gammaRe.push(gr);
                gammaIm.push(gi);
            });

            traces.push({
                x: gammaRe,
                y: gammaIm,
                mode: "lines",
                line: { color: "#374151", width: 1 },
                hoverinfo: "skip",
                showlegend: false
            });
        });
    });

    // ---- Outer Circle ----
    let circleRe = [];
    let circleIm = [];

    for (let t = 0; t <= 2*Math.PI; t += 0.01) {
        circleRe.push(Math.cos(t));
        circleIm.push(Math.sin(t));
    }

    traces.push({
        x: circleRe,
        y: circleIm,
        mode: "lines",
        line: { color: "#6b7280", width: 2 },
        hoverinfo: "skip",
        showlegend: false
    });

    return traces;
}

function findSegments(indices){
    let segments = [];
    let start = indices[0];

    for(let i=1;i<indices.length;i++){
        if(indices[i] !== indices[i-1] + 1){
            segments.push([start, indices[i-1]]);
            start = indices[i];
        }
    }

    segments.push([start, indices[indices.length-1]]);
    return segments;
}
/* ================= BANDWIDTH ================= */
function measureBandwidth(){
    if(!datasets.length) return;

    const param = document.getElementById("paramSelect").value;
    const bwMode = document.getElementById("bwMode");

    // Auto-select IL or RL based on parameter
    bwMode.value = (param[1] !== param[2]) ? "il" : "rl";
    const mode = bwMode.value;

    const threshold = parseFloat(document.getElementById("rlThreshold").value);

    const table = document.getElementById("bwResultTable");
    const tbody = table.querySelector("tbody");
    tbody.innerHTML = "";
    let bwMarkersAll = [];

    datasets.forEach((ds, idx) => {

        const f_Hz = ds.freq;
        const {scale: fScale, unit: fUnit} = getFreqScale(f_Hz);
        const f_plot = f_Hz.map(v => v / fScale);

        let indices = [];
        const color = bwColors[idx % bwColors.length];

        const isTransmission = param[1] !== param[2];

        if(mode === "il" && isTransmission){
            const magDB = ds.sparams[param].map(c => 20*Math.log10(mag(c)));
            const peak = Math.max(...magDB);
            const target = peak - threshold;
            indices = magDB.map((v,i)=>v>=target?i:-1).filter(i=>i>=0);
        } else {
            const rl = ds.sparams[param].map(c => -20*Math.log10(mag(c)));
            indices = rl.map((v,i)=>v>=threshold?i:-1).filter(i=>i>=0);
        }

        if(indices.length){

            const segments = findSegments(indices);

            segments.forEach(seg => {

                const f1Hz = f_Hz[seg[0]];
                const f2Hz = f_Hz[seg[1]];

                const bwHz = f2Hz - f1Hz;
                const magDb = ds.processed[param].magDB;

                const linearity = calculateLinearity(
                    f_Hz,
                    magDb,
                    f1Hz,
                    f2Hz
                );
                // Format bandwidth nicely
                let bwDisplay;
                if (bwHz >= 1e9)      bwDisplay = (bwHz/1e9).toFixed(3) + " GHz";
                else if (bwHz >= 1e6) bwDisplay = (bwHz/1e6).toFixed(3) + " MHz";
                else if (bwHz >= 1e3) bwDisplay = (bwHz/1e3).toFixed(3) + " kHz";
                else                  bwDisplay = bwHz.toFixed(3) + " Hz";


                const row = document.createElement("tr");
                row.style.cursor = "pointer";

                row.innerHTML = `
                    <td style="color:${color}">${ds.name}</td>
                    <td>${(f1Hz/fScale).toFixed(6)} ${fUnit}</td>
                    <td>${(f2Hz/fScale).toFixed(6)} ${fUnit}</td>
                    <td>±${linearity} dB</td>
                    <td><b>${bwDisplay}</b></td>
                `;

                row.dataset.start = f1Hz;
                row.dataset.stop  = f2Hz;

                row.onclick = function() {
                    document.getElementById("startFreq").value = formatFreqForInput(parseFloat(this.dataset.start));
                    document.getElementById("stopFreq").value  = formatFreqForInput(parseFloat(this.dataset.stop));
                    this.style.background = "#2563eb";
                    setTimeout(()=>this.style.background="", 300);
                };

                tbody.appendChild(row);

                bwMarkersAll.push({dataset: ds.name, f1: f1Hz/fScale, f2: f2Hz/fScale, color});
            });

        } else {

            const row = document.createElement("tr");
            row.innerHTML = `
                <td style="color:#FF0000">${ds.name}</td>
                <td colspan="3">No valid region</td>
            `;
            tbody.appendChild(row);
        }
    });

    // Draw vertical lines on all plots
    ["magPlot","phasePlot","rlPlot","vswrPlot","gdPlot","impPlot"].forEach(id=>{
        let shapes = [];
        bwMarkersAll.forEach(bw=>{
            shapes.push(
                { type: 'line', x0: bw.f1, x1: bw.f1, y0: 0, y1: 1, yref:'paper', line:{color:bw.color,width:2,dash:'dot'} },
                { type: 'line', x0: bw.f2, x1: bw.f2, y0: 0, y1: 1, yref:'paper', line:{color:bw.color,width:2,dash:'dot'} }
            );
        });
        Plotly.relayout(id, {shapes});
    });

    // Save markers globally
    bwMarkers = bwMarkersAll.flatMap(b => [b.f1, b.f2]);
}

function calculateLinearity(freq, magDb, startFreq, stopFreq) {
    const indices = [];

    for (let i = 0; i < freq.length; i++) {
        if (freq[i] >= startFreq && freq[i] <= stopFreq) {
            indices.push(i);
        }
    }

    const x = indices.map(i => freq[i]);
    const y = indices.map(i => magDb[i]);

    // Linear regression
    const n = x.length;
    const sumX = x.reduce((a,b)=>a+b,0);
    const sumY = y.reduce((a,b)=>a+b,0);
    const sumXY = x.reduce((a,b,i)=>a + b*y[i],0);
    const sumX2 = x.reduce((a,b)=>a + b*b,0);

    const slope = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);
    const intercept = (sumY - slope*sumX) / n;

    // Calculate deviation
    let maxDev = 0;
    for (let i = 0; i < n; i++) {
        const fitted = slope*x[i] + intercept;
        const dev = Math.abs(y[i] - fitted);
        if (dev > maxDev) maxDev = dev;
    }

    return maxDev.toFixed(3); // in dB
}

/* ================= File DROP ================= */
function handleFiles(files){

    if(!files.length) return;

    datasets = [];
    let loaded = 0;

    for(let file of files){

        if(!file.name.match(/\.s\d+p$/i)) continue;

        let reader = new FileReader();

        reader.onload = function(ev){

            let ds = parseTouchstone(ev.target.result, file.name);
            if(!ds) return;

            processDataset(ds);
            datasets.push(ds);

            loaded++;

            if(loaded === files.length){

                populateParams();

                let minF = Math.min(...datasets[0].freq);
                let maxF = Math.max(...datasets[0].freq);

                document.getElementById("startFreq").value = formatFreqForInput(minF);
                document.getElementById("stopFreq").value  = formatFreqForInput(maxF);

                updateAll();
            }
        };

        reader.readAsText(file);
    }
}

        e.preventDefault();

    window.addEventListener("dragleave", (e) => {
        if (e.target === document.documentElement) {
            overlay.classList.add("hidden");
        }
    });

        e.preventDefault();
        overlay.classList.add("hidden");

        const validFiles = Array.from(e.dataTransfer.files)
            .filter(file => file.name.match(/\.s\d+p$/i));

        if (validFiles.length) {
            handleFiles(validFiles);
        } else {
            alert("Please drop valid Touchstone files (.s1p, .s2p, etc.)");
        }
    });

});

function formatEngineering(freqHz) {
    const abs = Math.abs(freqHz);

    if (abs >= 1e9)  return (freqHz / 1e9).toFixed(3) + " GHz";
    if (abs >= 1e6)  return (freqHz / 1e6).toFixed(3) + " MHz";
    if (abs >= 1e3)  return (freqHz / 1e3).toFixed(3) + " kHz";
    return freqHz.toFixed(3) + " Hz";
}

async function loadDemoFile() {

        updateAll();

        console.log("Multiple demo files loaded.");

    } catch (err) {
        console.error("Demo loading error:", err);
    }
}
